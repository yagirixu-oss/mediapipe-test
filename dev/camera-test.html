<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camera Permission Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
        background: #101418;
        color: #f8fafc;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        display: grid;
        gap: 16px;
      }

      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        background: #020617;
        object-fit: contain;
      }

      button {
        width: fit-content;
        min-height: 44px;
        padding: 0 18px;
        border: 0;
        border-radius: 8px;
        background: #14b8a6;
        color: #04111a;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      pre {
        min-height: 120px;
        margin: 0;
        padding: 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Camera Permission Test</h1>
      <button id="startButton" type="button">カメラ許可テスト</button>
      <video id="preview" playsinline muted autoplay></video>
      <pre id="log">待機中</pre>
    </main>

    <script>
      const startButton = document.getElementById("startButton");
      const preview = document.getElementById("preview");
      const log = document.getElementById("log");

      function write(message) {
        log.textContent += `\n${message}`;
      }

      async function readPermissionState() {
        if (!navigator.permissions?.query) {
          return "permissions API unavailable";
        }

        try {
          const result = await navigator.permissions.query({ name: "camera" });
          return result.state;
        } catch (error) {
          return `permission query failed: ${error.name}`;
        }
      }

      startButton.addEventListener("click", async () => {
        log.textContent = `url: ${location.href}`;
        write(`secureContext: ${window.isSecureContext}`);
        write(`mediaDevices: ${Boolean(navigator.mediaDevices)}`);
        write(`getUserMedia: ${Boolean(navigator.mediaDevices?.getUserMedia)}`);
        write(`permission before: ${await readPermissionState()}`);

        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          write(`devices before: ${devices.map((device) => `${device.kind}:${device.label || "(no label)"}`).join(", ")}`);
        } catch (error) {
          write(`enumerate before failed: ${error.name} ${error.message}`);
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          preview.srcObject = stream;
          await preview.play();
          write("getUserMedia: success");
          write(`permission after: ${await readPermissionState()}`);
        } catch (error) {
          write(`getUserMedia failed: ${error.name} ${error.message}`);
          write(`permission after: ${await readPermissionState()}`);
        }
      });
    </script>
  </body>
</html>
